---
# Deploys the pSSID GUI application stack.
#
# In prod mode the heavy lifting is done by the repository's own installer
# (install.sh), which this role runs non-interactively. That keeps the Ansible
# path and the manual "./install.sh" path identical: one set of logic generates
# the secrets, certificates, nginx config, and environment files.
#
# In dev mode the role brings up the hot-reload stack (docker-compose.local.yml)
# instead; no certificates or nginx config are needed for that.

- name: Install packages the deployment needs
  ansible.builtin.package:
    name:
      - git
      - make
      - openssl
      - curl
      # cron daemon for the scheduled backups (Debian: cron, RHEL: cronie)
      - "{{ 'cron' if ansible_os_family == 'Debian' else 'cronie' }}"
    state: present

# ---- Locate or fetch the application source --------------------------------

- name: Check whether this playbook is running from inside a checkout
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/../install.sh"
  register: local_checkout
  when: pssid_gui_deploy_from in ['auto', 'checkout']

- name: Use the local checkout as the application source
  ansible.builtin.set_fact:
    pssid_gui_src: "{{ (playbook_dir ~ '/..') | realpath }}"
  when: >
    pssid_gui_deploy_from == 'checkout' or
    (pssid_gui_deploy_from == 'auto' and (local_checkout.stat.exists | default(false)))

- name: Clone the repository as the application source
  when: pssid_gui_src is not defined
  block:
    - name: Clone pSSID GUI
      ansible.builtin.git:
        repo: "{{ pssid_gui_repo }}"
        dest: "{{ pssid_gui_install_dir }}"
        version: "{{ pssid_gui_version }}"

    - name: Record the source directory
      ansible.builtin.set_fact:
        pssid_gui_src: "{{ pssid_gui_install_dir }}"

# ---- Storage relocation (optional) ------------------------------------------
# When pssid_gui_docker_data_root is set, move BOTH Docker's data-root and
# containerd's storage root onto that volume BEFORE the image build, so a VM
# whose /var/lib is a small partition does not run out of space mid-build.
# Idempotent; a freshly installed engine has almost nothing to migrate.

- name: Check for a dedicated filesystem mounted at /var/lib/docker
  ansible.builtin.command:
    argv: [mountpoint, -q, /var/lib/docker]
  register: pssid_gui_dedicated_docker_mount
  when: (pssid_gui_docker_data_root | default('')) | length == 0
  changed_when: false
  failed_when: false

- name: Read the dedicated Docker filesystem type
  ansible.builtin.command:
    argv: [findmnt, -n, -o, FSTYPE, -T, /var/lib/docker]
  register: pssid_gui_dedicated_docker_fstype
  when:
    - (pssid_gui_docker_data_root | default('')) | length == 0
    - (pssid_gui_dedicated_docker_mount.rc | default(1)) == 0
  changed_when: false
  failed_when: false

- name: Automatically use the dedicated local Docker filesystem
  ansible.builtin.set_fact:
    pssid_gui_docker_data_root: /var/lib/docker
  when:
    - (pssid_gui_docker_data_root | default('')) | length == 0
    - (pssid_gui_dedicated_docker_mount.rc | default(1)) == 0
    - (pssid_gui_dedicated_docker_fstype.stdout | default('')) not in ['nfs', 'nfs4', 'cifs', 'smb3', '9p', 'ceph', 'glusterfs', 'fuse.sshfs']

- name: Relocate Docker and containerd storage to a roomy volume
  ansible.builtin.command:
    argv:
      - bash
      - "{{ pssid_gui_src }}/scripts/setup-docker-storage.sh"
      - "{{ pssid_gui_docker_data_root }}"
  environment:
    PSSID_STORAGE_MIN_GIB: "{{ '4' if (pssid_gui_pull | bool) else '6' }}"
    PSSID_STORAGE_NEED_TEXT: >-
      {{ 'pulling the prebuilt images needs about 4 GB'
         if (pssid_gui_pull | bool)
         else 'the image build needs about 8-10 GB' }}
  when: (pssid_gui_docker_data_root | default('')) | length > 0
  changed_when: true

# ---- Upgrade support ---------------------------------------------------------
# Both tasks are inert on a normal deploy; upgrade.yml switches them on.

- name: Back up the database before upgrading (best effort on first runs)
  ansible.builtin.command:
    argv: [bash, scripts/backup.sh]
    chdir: "{{ pssid_gui_src }}"
  when: pssid_gui_backup_first | bool
  register: pssid_gui_preupgrade_backup
  changed_when: pssid_gui_preupgrade_backup.rc == 0
  # A missing mongo container just means there is nothing to back up yet.
  failed_when: false

# This checkout is deployment-owned, not a working copy. install.sh rewrites
# nginx.conf and shared/config.ts in place at deploy time, and earlier releases
# left other tracked files dirty too (a root package-lock.json, removed in an
# earlier release). Any such edit aborts the --ff-only pull below as soon as
# upstream touches or deletes the same path, which is how an upgrade stalls on
# a file no playbook ever wrote. Discard every tracked modification rather than an
# allowlist that has to be extended each time this recurs; the installer run
# below regenerates the files it owns from the playbook variables.
#
# Untracked files are left alone. Anything hand-edited inside this checkout is
# lost on upgrade by design: customisations belong in group_vars or the
# inventory, where they are reapplied on every run.
- name: Discard deploy-time edits that would conflict with the pull
  ansible.builtin.command:
    argv: [git, -C, "{{ pssid_gui_src }}", checkout, --, .]
  when: pssid_gui_git_update | bool
  changed_when: false
  failed_when: false

- name: Fast-forward the source checkout
  ansible.builtin.command:
    argv: [git, -C, "{{ pssid_gui_src }}", pull, --ff-only]
  when: pssid_gui_git_update | bool
  register: pssid_gui_git_pull
  changed_when: "'Already up to date' not in pssid_gui_git_pull.stdout"
  failed_when: pssid_gui_git_pull.rc != 0

# ---- Production: run the installer ------------------------------------------

- name: Assemble the installer arguments
  ansible.builtin.set_fact:
    pssid_gui_installer_argv: >-
      {{ ['bash', 'install.sh', '-y',
          '--edition=' ~ pssid_gui_edition,
          '--hostname=' ~ pssid_gui_hostname,
          '--tls=' ~ pssid_gui_tls,
          '--sso=' ~ (pssid_gui_sso | bool | string | lower)]
         + ((pssid_gui_sso | bool) | ternary(
              ['--issuer=' ~ pssid_gui_oidc_issuer,
               '--client-id=' ~ pssid_gui_oidc_client_id,
               '--client-secret=' ~ pssid_gui_oidc_client_secret], []))
         + ((pssid_gui_open_write | length > 0) | ternary(
              ['--open-write=' ~ pssid_gui_open_write], []))
         + ((pssid_gui_tls == 'letsencrypt' and (pssid_gui_letsencrypt_email | length > 0)) | ternary(
              ['--email=' ~ pssid_gui_letsencrypt_email], []))
         + ((pssid_gui_no_build | bool) | ternary(['--no-build'], []))
         + ((pssid_gui_pull | bool) | ternary(['--pull'], [])) }}
  when: pssid_gui_mode == 'prod'
  no_log: "{{ pssid_gui_sso | bool }}"

- name: Run the pSSID GUI installer (config, certificates, containers)
  ansible.builtin.command:
    argv: "{{ pssid_gui_installer_argv }}"
    chdir: "{{ pssid_gui_src }}"
  when: pssid_gui_mode == 'prod'
  changed_when: true
  # Never print the OIDC client secret. On failure, re-run install.sh by hand
  # in the source directory to see its full output.
  no_log: "{{ pssid_gui_sso | bool }}"

# ---- Development: hot-reload stack ------------------------------------------

- name: Development stack
  when: pssid_gui_mode == 'dev'
  block:
    - name: Ensure services/server/.env exists (compose mounts it as a file)
      ansible.builtin.copy:
        dest: "{{ pssid_gui_src }}/services/server/.env"
        content: |
          # Minimal development environment written by the Ansible dev playbook.
          # The dev database runs without authentication on the internal network.
          MONGODB_URI=mongodb://mongo:27017
          BASE_URL=http://localhost:8888
        force: false
        mode: "0600"

    - name: Start the development stack (hot reload)
      ansible.builtin.command:
        argv: [docker, compose, -f, docker-compose.local.yml, up, -d, --build]
        chdir: "{{ pssid_gui_src }}"
      environment:
        EDITION: "{{ pssid_gui_edition }}"
      changed_when: true

# ---- Reverse proxy -----------------------------------------------------------

# nginx resolves the `client` and `server` hostnames ONCE, when its config is
# loaded, and then caches those container IPs for the life of the worker. An
# upgrade recreates the application containers, Docker hands them new addresses,
# and nginx keeps dialling the old ones: every request to a moved upstream fails
# with "connect() failed (111: Connection refused)" and the browser gets a 502,
# while `docker compose ps` shows every container up and healthy.
#
# Observed in practice: nginx held 172.19.0.2 for `client` while Docker's DNS
# correctly answered 172.19.0.3, because the recycled .2 had by then been handed
# to MONGO -- so nginx was connecting to the database on port 8080 and being
# refused. Docker's DNS is not at fault and querying it proves nothing; the
# stale value lives inside the nginx process.
#
# Nothing else clears it. nginx is NOT recreated by the upgrade, because its own
# image and config are unchanged, so compose correctly leaves it alone -- which
# is exactly why it keeps the stale addresses. Recreate rather than `restart`:
# both re-resolve, but recreating also re-attaches the container if the compose
# networks themselves were rebuilt, which a restart would not do. `--no-deps`
# keeps this from touching the healthy application containers.
- name: Recreate nginx so it re-resolves the application container addresses
  ansible.builtin.command:
    argv: >-
      {{ ['docker', 'compose']
         + (['-f', 'docker-compose.local.yml'] if pssid_gui_mode == 'dev' else [])
         + ['up', '-d', '--force-recreate', '--no-deps', 'nginx'] }}
    chdir: "{{ pssid_gui_src }}"
  changed_when: true

# ---- Verify ------------------------------------------------------------------

- name: Determine the health check URLs
  ansible.builtin.set_fact:
    pssid_gui_health_url: >-
      {{ 'http://localhost:8888/api/health' if pssid_gui_mode == 'dev'
         else (('http' if pssid_gui_tls == 'none' else 'https') ~ '://localhost/api/health') }}
    pssid_gui_ui_url: >-
      {{ 'http://localhost:8888/dashboard' if pssid_gui_mode == 'dev'
         else (('http' if pssid_gui_tls == 'none' else 'https') ~ '://localhost/dashboard') }}

# The client image is pre-built (the bundle is compiled during the image build,
# not at container start), so containers start in seconds. 100 x 3s = 5 minutes
# comfortably covers server + database startup; the loop stops at first success.
- name: Wait for the application to become healthy
  ansible.builtin.uri:
    url: "{{ pssid_gui_health_url }}"
    validate_certs: false
    status_code: 200
  register: pssid_gui_health
  retries: 100
  delay: 3
  until: pssid_gui_health.status == 200

# /api/health only exercises the SERVER upstream. The web interface is proxied
# to a DIFFERENT container, so a stale address for the client returns 502 on
# every page while this health check still reports 200 -- which is how an
# upgrade can finish "successfully" onto a site that will not load at all. Check
# a UI route too, so the play fails where the problem is instead of leaving it
# to be found in a browser. 302 is a success here: with SSO on, an
# unauthenticated request to /dashboard redirects to the identity provider,
# which still proves the client upstream is reachable.
- name: Verify the web interface is served, not just the API
  ansible.builtin.uri:
    url: "{{ pssid_gui_ui_url }}"
    validate_certs: false
    # Do not chase the redirect: the point is that the local upstream answered,
    # and following it would send a deploy-time request to an external identity
    # provider, whose reachability is not what this task is testing.
    follow_redirects: none
    status_code: [200, 302]
  register: pssid_gui_ui
  retries: 20
  delay: 3
  until: pssid_gui_ui.status in [200, 302]

# ---- First-install starter data ----------------------------------------------
# Runs once per host: the marker file makes every later run (and every upgrade)
# leave the operator's data alone, including deliberately deleted defaults.

- name: Starter defaults (first install only)
  when: pssid_gui_mode == 'prod' and (pssid_gui_seed_defaults | bool)
  block:
    - name: Ensure the state directory exists
      ansible.builtin.file:
        path: "{{ pssid_gui_state_dir }}"
        state: directory
        mode: "0755"

    - name: Check whether starter defaults were already loaded
      ansible.builtin.stat:
        path: "{{ pssid_gui_state_dir }}/.defaults-seeded"
      register: pssid_gui_seed_marker

    - name: Load the starter defaults into MongoDB
      ansible.builtin.command:
        argv: [bash, scripts/seed-defaults.sh]
        chdir: "{{ pssid_gui_src }}"
      when: not pssid_gui_seed_marker.stat.exists
      changed_when: true

    - name: Record that the starter defaults were loaded
      ansible.builtin.copy:
        dest: "{{ pssid_gui_state_dir }}/.defaults-seeded"
        content: |
          Starter defaults loaded by the pSSID GUI Ansible role.
          Delete this file and re-run the playbook to load them again.
        mode: "0644"
      when: not pssid_gui_seed_marker.stat.exists

# ---- Scheduled backups ---------------------------------------------------------

- name: Schedule the nightly MongoDB backup
  ansible.builtin.cron:
    name: pSSID GUI nightly MongoDB backup
    minute: "{{ pssid_gui_backup_minute }}"
    hour: "{{ pssid_gui_backup_hour }}"
    job: >-
      cd {{ pssid_gui_src }} &&
      BACKUP_RETENTION_DAYS={{ pssid_gui_backup_retention_days }}
      bash scripts/backup.sh >> /var/log/pssid-gui-backup.log 2>&1
    state: "{{ 'present' if (pssid_gui_backup_cron | bool) else 'absent' }}"
  when: pssid_gui_mode == 'prod'

- name: Deployment summary
  ansible.builtin.debug:
    msg: >-
      pSSID GUI is up at
      {{ 'http://localhost:8888' if pssid_gui_mode == 'dev'
         else (('http' if pssid_gui_tls == 'none' else 'https') ~ '://' ~ pssid_gui_hostname) }}
      (mode: {{ pssid_gui_mode }}, edition: {{ pssid_gui_edition }},
      source: {{ pssid_gui_src }},
      nightly backups: {{ 'on (' ~ pssid_gui_backup_hour ~ ':' ~ pssid_gui_backup_minute ~ ')' if (pssid_gui_backup_cron | bool and pssid_gui_mode == 'prod') else 'off' }})
