---
# Deploys the pSSID GUI application stack.
#
# In prod mode the heavy lifting is done by the repository's own installer
# (install.sh), which this role runs non-interactively. That keeps the Ansible
# path and the manual "./install.sh" path identical: one set of logic generates
# the secrets, certificates, nginx config, and environment files.
#
# In dev mode the role brings up the hot-reload stack (docker-compose.local.yml)
# instead; no certificates or nginx config are needed for that.

- name: Install packages the deployment needs
  ansible.builtin.package:
    name:
      - git
      - make
      - openssl
      - curl
      # cron daemon for the scheduled backups (Debian: cron, RHEL: cronie)
      - "{{ 'cron' if ansible_os_family == 'Debian' else 'cronie' }}"
    state: present

# ---- Locate or fetch the application source --------------------------------

- name: Check whether this playbook is running from inside a checkout
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/../install.sh"
  register: local_checkout
  when: pssid_gui_deploy_from in ['auto', 'checkout']

- name: Use the local checkout as the application source
  ansible.builtin.set_fact:
    pssid_gui_src: "{{ (playbook_dir ~ '/..') | realpath }}"
  when: >
    pssid_gui_deploy_from == 'checkout' or
    (pssid_gui_deploy_from == 'auto' and (local_checkout.stat.exists | default(false)))

- name: Clone the repository as the application source
  when: pssid_gui_src is not defined
  block:
    - name: Clone pSSID GUI
      ansible.builtin.git:
        repo: "{{ pssid_gui_repo }}"
        dest: "{{ pssid_gui_install_dir }}"
        version: "{{ pssid_gui_version }}"

    - name: Record the source directory
      ansible.builtin.set_fact:
        pssid_gui_src: "{{ pssid_gui_install_dir }}"

# ---- Upgrade support ---------------------------------------------------------
# Both tasks are inert on a normal deploy; upgrade.yml switches them on.

- name: Back up the database before upgrading (best effort on first runs)
  ansible.builtin.command:
    argv: [bash, scripts/backup.sh]
    chdir: "{{ pssid_gui_src }}"
  when: pssid_gui_backup_first | bool
  register: pssid_gui_preupgrade_backup
  changed_when: pssid_gui_preupgrade_backup.rc == 0
  # A missing mongo container just means there is nothing to back up yet.
  failed_when: false

- name: Fast-forward the source checkout
  ansible.builtin.command:
    argv: [git, -C, "{{ pssid_gui_src }}", pull, --ff-only]
  when: pssid_gui_git_update | bool
  register: pssid_gui_git_pull
  changed_when: "'Already up to date' not in pssid_gui_git_pull.stdout"
  failed_when: pssid_gui_git_pull.rc != 0

# ---- Production: run the installer ------------------------------------------

- name: Assemble the installer arguments
  ansible.builtin.set_fact:
    pssid_gui_installer_argv: >-
      {{ ['bash', 'install.sh', '-y',
          '--edition=' ~ pssid_gui_edition,
          '--hostname=' ~ pssid_gui_hostname,
          '--tls=' ~ pssid_gui_tls,
          '--sso=' ~ (pssid_gui_sso | bool | string | lower)]
         + ((pssid_gui_sso | bool) | ternary(
              ['--issuer=' ~ pssid_gui_oidc_issuer,
               '--client-id=' ~ pssid_gui_oidc_client_id,
               '--client-secret=' ~ pssid_gui_oidc_client_secret], []))
         + ((pssid_gui_tls == 'letsencrypt' and (pssid_gui_letsencrypt_email | length > 0)) | ternary(
              ['--email=' ~ pssid_gui_letsencrypt_email], []))
         + ((pssid_gui_no_build | bool) | ternary(['--no-build'], [])) }}
  when: pssid_gui_mode == 'prod'
  no_log: "{{ pssid_gui_sso | bool }}"

- name: Run the pSSID GUI installer (config, certificates, containers)
  ansible.builtin.command:
    argv: "{{ pssid_gui_installer_argv }}"
    chdir: "{{ pssid_gui_src }}"
  when: pssid_gui_mode == 'prod'
  changed_when: true
  # Never print the OIDC client secret. On failure, re-run install.sh by hand
  # in the source directory to see its full output.
  no_log: "{{ pssid_gui_sso | bool }}"

# ---- Development: hot-reload stack ------------------------------------------

- name: Development stack
  when: pssid_gui_mode == 'dev'
  block:
    - name: Ensure services/server/.env exists (compose mounts it as a file)
      ansible.builtin.copy:
        dest: "{{ pssid_gui_src }}/services/server/.env"
        content: |
          # Minimal development environment written by the Ansible dev playbook.
          # The dev database runs without authentication on the internal network.
          MONGODB_URI=mongodb://mongo:27017
          BASE_URL=http://localhost:8888
        force: false
        mode: "0600"

    - name: Start the development stack (hot reload)
      ansible.builtin.command:
        argv: [docker, compose, -f, docker-compose.local.yml, up, -d, --build]
        chdir: "{{ pssid_gui_src }}"
      environment:
        EDITION: "{{ pssid_gui_edition }}"
      changed_when: true

# ---- Verify ------------------------------------------------------------------

- name: Determine the health check URL
  ansible.builtin.set_fact:
    pssid_gui_health_url: >-
      {{ 'http://localhost:8888/api/health' if pssid_gui_mode == 'dev'
         else (('http' if pssid_gui_tls == 'none' else 'https') ~ '://localhost/api/health') }}

# The client compiles its production bundle at container start, so the first
# start after a deploy/upgrade takes a few minutes before nginx comes up.
# 160 x 3s = 8 minutes; the loop stops at the first success.
- name: Wait for the application to become healthy
  ansible.builtin.uri:
    url: "{{ pssid_gui_health_url }}"
    validate_certs: false
    status_code: 200
  register: pssid_gui_health
  retries: 160
  delay: 3
  until: pssid_gui_health.status == 200

# ---- First-install starter data ----------------------------------------------
# Runs once per host: the marker file makes every later run (and every upgrade)
# leave the operator's data alone, including deliberately deleted defaults.

- name: Starter defaults (first install only)
  when: pssid_gui_mode == 'prod' and (pssid_gui_seed_defaults | bool)
  block:
    - name: Ensure the state directory exists
      ansible.builtin.file:
        path: "{{ pssid_gui_state_dir }}"
        state: directory
        mode: "0755"

    - name: Check whether starter defaults were already loaded
      ansible.builtin.stat:
        path: "{{ pssid_gui_state_dir }}/.defaults-seeded"
      register: pssid_gui_seed_marker

    - name: Load the starter defaults into MongoDB
      ansible.builtin.command:
        argv: [bash, scripts/seed-defaults.sh]
        chdir: "{{ pssid_gui_src }}"
      when: not pssid_gui_seed_marker.stat.exists
      changed_when: true

    - name: Record that the starter defaults were loaded
      ansible.builtin.copy:
        dest: "{{ pssid_gui_state_dir }}/.defaults-seeded"
        content: |
          Starter defaults loaded by the pSSID GUI Ansible role.
          Delete this file and re-run the playbook to load them again.
        mode: "0644"
      when: not pssid_gui_seed_marker.stat.exists

# ---- Scheduled backups ---------------------------------------------------------

- name: Schedule the nightly MongoDB backup
  ansible.builtin.cron:
    name: pSSID GUI nightly MongoDB backup
    minute: "{{ pssid_gui_backup_minute }}"
    hour: "{{ pssid_gui_backup_hour }}"
    job: >-
      cd {{ pssid_gui_src }} &&
      BACKUP_RETENTION_DAYS={{ pssid_gui_backup_retention_days }}
      bash scripts/backup.sh >> /var/log/pssid-gui-backup.log 2>&1
    state: "{{ 'present' if (pssid_gui_backup_cron | bool) else 'absent' }}"
  when: pssid_gui_mode == 'prod'

- name: Deployment summary
  ansible.builtin.debug:
    msg: >-
      pSSID GUI is up at
      {{ 'http://localhost:8888' if pssid_gui_mode == 'dev'
         else (('http' if pssid_gui_tls == 'none' else 'https') ~ '://' ~ pssid_gui_hostname) }}
      (mode: {{ pssid_gui_mode }}, edition: {{ pssid_gui_edition }},
      source: {{ pssid_gui_src }},
      nightly backups: {{ 'on (' ~ pssid_gui_backup_hour ~ ':' ~ pssid_gui_backup_minute ~ ')' if (pssid_gui_backup_cron | bool and pssid_gui_mode == 'prod') else 'off' }})
