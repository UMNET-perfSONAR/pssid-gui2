---
# pSSID GUI deployment settings.
#
# Every variable is optional; the defaults live in
# roles/pssid_webgui/defaults/main.yml. Uncomment a line here to override it
# for all hosts, or pass -e name=value on the command line for a single run.

# prod (HTTPS stack behind nginx) or dev (hot reload on http://localhost:8888).
# pssid_gui_mode: prod

# Interface edition: default | umich
# pssid_gui_edition: default

# Public hostname of this deployment. Defaults to the machine's FQDN.
# pssid_gui_hostname: pssid.example.edu

# TLS mode: self-signed | letsencrypt | none
# pssid_gui_tls: self-signed
# pssid_gui_letsencrypt_email: you@example.edu

# Single sign-on (OIDC). Store the secret in an Ansible Vault file rather than
# here in plain text when committing inventories.
# pssid_gui_sso: true
# pssid_gui_oidc_issuer: https://umich.okta.com
# pssid_gui_oidc_client_id: ...
# pssid_gui_oidc_client_secret: ...

# Source selection: auto | checkout | git (see roles/pssid_webgui/defaults).
# pssid_gui_deploy_from: auto
# pssid_gui_repo: https://github.com/UMNET-perfSONAR/pssid-gui2.git
# pssid_gui_version: main
# pssid_gui_install_dir: /opt/pssid-gui

# Reuse existing local images instead of building.
# pssid_gui_no_build: false

# Put Docker + containerd storage on a roomier volume before the build, for VMs
# whose /var/lib is a small partition. Empty = system defaults. Example:
# pssid_gui_docker_data_root: /usr/local/miserver/docker

# Load the starter defaults (schedules, SSID profiles, a metadata test, the
# "all" host group) on the FIRST install only. A marker file under
# /var/lib/pssid makes re-runs and upgrades leave data alone.
# pssid_gui_seed_defaults: true

# Nightly MongoDB backups (cron). Archives go to mongo-backups/ in the source
# directory; restore with scripts/restore.sh. Retention 0 keeps everything.
# pssid_gui_backup_cron: true
# pssid_gui_backup_hour: "3"
# pssid_gui_backup_minute: "15"
# pssid_gui_backup_retention_days: 14
