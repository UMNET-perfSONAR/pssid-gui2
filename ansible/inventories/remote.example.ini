# Example inventory for deploying to a remote host over SSH.
# Copy this file to remote.ini, edit the hostname, then run:
#
#   ansible-playbook -i inventories/remote.ini site.yml
#
# The playbook needs root on the target (ansible_user=root, or a sudo-capable
# user plus --ask-become-pass).
[pssid_gui]
pssid.example.edu ansible_user=root
