# Cap container logs so they can never fill the disk (a common unattended-host
# failure). Applied to every service via the *default-logging anchor.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  redis:
    image: redis:7
    profiles:
      - sso
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal
  client:
    image: pssid-gui2_client:latest
    build: ./services/client
    restart: unless-stopped
    logging: *default-logging
    environment:
      # Selects the edition (see services/client/src/edition). Set EDITION in the
      # root .env; the installer and Makefile manage this.
      - VITE_EDITION=${EDITION:-default}
    volumes:
      - ./services/client/src:/usr/src/app/client/src
      - client_node_modules:/usr/src/app/client/node_modules
      - ./shared:/usr/src/app/client/src/shared:ro
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      internal:
        aliases:
          - client

  server:
    image: pssid-gui2_server:latest
    restart: unless-stopped
    logging: *default-logging
    build: ./services/server
    environment:
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./services/server/src:/usr/src/app/server/src
      - ./services/server/.env:/usr/src/app/server/.env
      - server_node_modules:/usr/src/app/server/node_modules
      - /usr/lib/exec/pssid:/usr/src/app/server/bin
      - /var/lib/pssid/plugins:/usr/src/app/server/plugins
      - /var/lib/pssid/output:/usr/src/app/server/output
      - ./shared:/usr/src/app/server/src/shared:ro
      - ./certs:/etc/letsencrypt:ro
    expose:
      - "8000"
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      internal:
        aliases:
          - server
  mongo:
    image: pssid-gui2_mongo:latest
    build: ./services/database
    restart: unless-stopped
    logging: *default-logging
    environment:
      # When MONGO_USERNAME/MONGO_PASSWORD are set (the installer generates them),
      # the official image creates this root user on first initialization and
      # enables authentication. Left empty, the database runs without auth, which
      # preserves the previous behaviour for a plain `docker compose up`.
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USERNAME:-}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD:-}
    expose:
      - "27017"
    healthcheck:
      # ping is allowed without authentication, so this works either way.
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - internal
    volumes:
      - mongo_db:/data/db

  nginx:
    image: nginx:stable-alpine
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ./www/certbot:/var/www/certbot
    depends_on:
      client:
        condition: service_healthy
      server:
        condition: service_healthy
    networks:
      - internal
      - web

  certbot:
    image: certbot/certbot
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - ./certs/:/etc/letsencrypt
      - ./www/certbot:/var/www/certbot
    entrypoint: /bin/sh -c
    command: >
      "trap exit TERM;
      while :; do
        certbot renew --webroot -w /var/www/certbot;
        sleep 12h;
      done"

  # Opt-in automated backups. Enable with:  docker compose --profile backup up -d
  # Dumps the gui database to ./mongo-backups on a schedule and prunes old files.
  # Set-and-forget: no host cron, no operator action after enabling.
  backup:
    image: pssid-gui2_mongo:latest
    profiles:
      - backup
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      - BACKUP_INTERVAL_HOURS=${BACKUP_INTERVAL_HOURS:-24}
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-14}
      - MONGO_USERNAME=${MONGO_USERNAME:-}
      - MONGO_PASSWORD=${MONGO_PASSWORD:-}
    volumes:
      - ./mongo-backups:/backups
    entrypoint: /bin/sh -c
    command: >
      "trap exit TERM;
      while :; do
        ts=$$(date +%F-%H-%M);
        if [ -n \"$$MONGO_PASSWORD\" ]; then URI=\"mongodb://$$MONGO_USERNAME:$$MONGO_PASSWORD@mongo:27017/gui?authSource=admin\"; else URI=\"mongodb://mongo:27017/gui\"; fi;
        echo \"[backup] dumping gui -> /backups/backup-$$ts.gz\";
        mongodump --uri=\"$$URI\" --archive=/backups/backup-$$ts.gz --gzip || echo '[backup] dump failed';
        find /backups -name 'backup-*.gz' -mtime +$${BACKUP_RETENTION_DAYS} -delete 2>/dev/null || true;
        sleep $${BACKUP_INTERVAL_HOURS}h;
      done"
    networks:
      - internal

volumes:
  client_node_modules:
  server_node_modules:
  mongo_db:
  npm_data:
  npm_letsencrypt:
  redis_data:

networks:
  internal:
    driver: bridge
  web:
