x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  client:
    image: pssid-gui2_client:latest
    build: ./services/client
    logging: *default-logging
    # Development stack: run the Vite dev server (hot reload) instead of the
    # image's default production command (build once, serve dist/ statically).
    command: npm run dev
    environment:
      # Selects the edition (see services/client/src/edition). Override with
      # EDITION=umich in the root .env, or `make edition-umich`.
      - VITE_EDITION=${EDITION:-default}
    volumes:
      - ./services/client/src:/usr/src/app/client/src
      - client_node_modules:/usr/src/app/client/node_modules
      - ./shared:/usr/src/app/client/src/shared:ro
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      # The entrypoint reconciles node_modules (npm install) before Vite starts.
      start_period: 60s
    networks:
      internal:
        aliases:
          - client

  server:
    image: pssid-gui2_server:latest
    restart: on-failure
    logging: *default-logging
    build: ./services/server
    volumes:
      - ./services/server/src:/usr/src/app/server/src
      - ./services/server/.env:/usr/src/app/server/.env
      - server_node_modules:/usr/src/app/server/node_modules
      - ./shared:/usr/src/app/server/src/shared:ro
    expose:
      - "8000"
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      internal:
        aliases:
          - server

  mongo:
    image: pssid-gui2_mongo:latest
    build: ./services/database
    logging: *default-logging
    expose:
      - "27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - internal
    volumes:
      - mongo_db:/data/db

  nginx:
    image: nginx:stable-alpine
    logging: *default-logging
    ports:
      - "8888:80"
    volumes:
      - ./nginx.local.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      client:
        condition: service_healthy
      server:
        condition: service_healthy
    networks:
      - internal

volumes:
  client_node_modules:
  server_node_modules:
  mongo_db:

networks:
  internal:
    driver: bridge
