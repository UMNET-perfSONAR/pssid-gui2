x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  client:
    image: pssid-gui2_client-dev:latest
    build:
      context: .
      dockerfile: services/client/Dockerfile
      # The dev stack runs the Vite dev server against mounted source, which
      # needs the full node_modules — target the build stage (the production
      # compose uses the slim runtime stage and its own image tag).
      target: build
      args:
        VITE_EDITION: ${EDITION:-default}
    logging: *default-logging
    # Development stack: run the Vite dev server (hot reload) against the mounted
    # source, instead of the image's default static serving of the pre-built
    # bundle. node_modules comes from the image (built via npm ci), so no volume.
    command: npm run dev
    environment:
      # Selects the edition (see services/client/src/edition). Override by
      # setting EDITION=<id> in the root .env.
      - VITE_EDITION=${EDITION:-default}
    volumes:
      - ./services/client/src:/usr/src/app/client/src
      - ./shared:/usr/src/app/client/src/shared:ro
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      internal:
        aliases:
          - client

  server:
    image: pssid-gui2_server-dev:latest
    restart: on-failure
    logging: *default-logging
    build:
      context: .
      dockerfile: services/server/Dockerfile
      # The dev stack runs the watch toolchain (tsc -w + nodemon) against the
      # mounted source, which needs the full node_modules and the TypeScript
      # compiler — target the build stage (the production compose uses the slim
      # runtime stage, which ships compiled output only).
      target: build
    volumes:
      - ./services/server/src:/usr/src/app/server/src
      - ./services/server/.env:/usr/src/app/server/.env
      - server_node_modules:/usr/src/app/server/node_modules
      - ./shared:/usr/src/app/server/src/shared:ro
    expose:
      - "8000"
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      internal:
        aliases:
          - server

  mongo:
    image: pssid-gui2_mongo:latest
    build: ./services/database
    logging: *default-logging
    expose:
      - "27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - internal
    volumes:
      - mongo_db:/data/db

  nginx:
    image: nginx:stable-alpine
    logging: *default-logging
    ports:
      - "8888:80"
    volumes:
      - ./nginx.local.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      client:
        condition: service_healthy
      server:
        condition: service_healthy
    networks:
      - internal

volumes:
  server_node_modules:
  mongo_db:

networks:
  internal:
    driver: bridge
