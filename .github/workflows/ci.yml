name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server:
    name: Server (typecheck + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: services/server/package-lock.json
      # The shared/ dir is mounted into the container at runtime; mirror it for CI.
      - name: Stage shared config
        run: mkdir -p src/shared && cp ../../shared/* src/shared/
      - run: npm ci
      - name: Typecheck (strict)
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      - name: Dependency audit (advisory)
        run: npm audit --omit=dev --audit-level=high || true

  client:
    name: Client (build + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: services/client/package-lock.json
      - name: Stage shared config
        run: mkdir -p src/shared && cp ../../shared/* src/shared/
      - run: npm ci
      - name: Production build
        run: npx vite build
      - name: Type check (advisory)
        run: npx vue-tsc --noEmit || true
      - name: Unit tests
        run: npm test
      - name: Dependency audit (advisory)
        run: npm audit --omit=dev --audit-level=high || true
