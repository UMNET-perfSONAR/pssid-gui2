name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server:
    name: Server (typecheck + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: services/server/package-lock.json
      # The shared/ dir is mounted into the container at runtime; mirror it for CI.
      - name: Stage shared config
        run: mkdir -p src/shared && cp ../../shared/* src/shared/
      - run: npm ci
      - name: Typecheck (strict)
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      # Gating on the PRODUCTION tree only, and only at high/critical. What ships
      # in the image must stay clean, and both trees are clean today, so this
      # fails only on a genuine regression. The dev tree stays advisory below:
      # build and test tooling never reaches a deployment, and letting a CVE in
      # a transitive vite/vitest dependency block every merge trains people to
      # ignore the signal — which is how the real one gets missed.
      - name: Dependency audit (production deps, gating)
        run: npm audit --omit=dev --audit-level=high
      - name: Dependency audit (dev deps, advisory)
        run: npm audit --audit-level=high || true

  automation:
    name: Automation (ansible + shell syntax)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ansible-core
        run: pipx install ansible-core || pip install ansible-core
      - name: Playbook syntax check
        working-directory: ansible
        run: |
          ansible-playbook --syntax-check site.yml
          ansible-playbook --syntax-check upgrade.yml
          ansible-playbook --syntax-check dev.yml
      - name: Shell script syntax check
        run: |
          bash -n bootstrap.sh install.sh
          for f in scripts/*.sh; do bash -n "$f"; done

  smoke:
    name: End-to-end smoke (full stack)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The compose file bind-mounts this env file; create it before `up` so
      # Docker does not materialize a directory in its place.
      # OPEN_WRITE: the shipped default is read-only (shared/config.ts), so
      # without this the smoke suite's create/update/delete checks all 403.
      # Set here rather than in the committed config so the safe default stands.
      - name: Write the dev server environment
        run: |
          printf 'MONGODB_URI=mongodb://mongo:27017\nBASE_URL=http://localhost:8888\nOPEN_WRITE=true\n' \
            > services/server/.env
      - name: Build and start the dev stack
        run: docker compose -f docker-compose.local.yml up -d --build
      - name: Wait for the stack to become healthy
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8888/api/health >/dev/null; then exit 0; fi
            sleep 5
          done
          echo "Stack never became healthy"; exit 1
      - name: Run the end-to-end smoke suite (every user action)
        run: bash scripts/smoke-test.sh http://localhost:8888
      - name: Show container state and logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.local.yml ps
          docker compose -f docker-compose.local.yml logs --tail=200

  client:
    name: Client (build + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: services/client/package-lock.json
      - name: Stage shared config
        run: mkdir -p src/shared && cp ../../shared/* src/shared/
      - run: npm ci
      # Gating, not advisory: the production image compiles the bundle at build
      # time (`npm run build` = vue-tsc + vite build), so a type error fails the
      # image build. Catch it here first, on every PR, instead of on a VM.
      - name: Type check (strict, all sources incl. tests)
        run: npm run typecheck
      - name: Production build (same as the image)
        run: npm run build
      - name: Unit tests
        run: npm test
      # Gating on the PRODUCTION tree only, and only at high/critical. What ships
      # in the image must stay clean, and both trees are clean today, so this
      # fails only on a genuine regression. The dev tree stays advisory below:
      # build and test tooling never reaches a deployment, and letting a CVE in
      # a transitive vite/vitest dependency block every merge trains people to
      # ignore the signal — which is how the real one gets missed.
      - name: Dependency audit (production deps, gating)
        run: npm audit --omit=dev --audit-level=high
      - name: Dependency audit (dev deps, advisory)
        run: npm audit --audit-level=high || true
