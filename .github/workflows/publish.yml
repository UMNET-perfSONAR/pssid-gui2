name: Publish images

# Builds the production images and pushes them to GitHub Container Registry,
# so deployments can `install.sh --pull` (or PSSID_PULL=true bootstrap) instead
# of building on the VM — ~4 GB of Docker storage instead of ~8-10 GB.
#
# Images (public once the packages are set to public in the repo settings):
#   ghcr.io/<owner>/pssid-gui2_client:latest   (+ :sha-<commit>)
#   ghcr.io/<owner>/pssid-gui2_server:latest
#   ghcr.io/<owner>/pssid-gui2_mongo:latest
#
# The client is published per edition: the default edition as :latest and the
# umich edition as :umich (the brand is baked into the bundle at build time).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ghcr requires a lowercase namespace; repository owner may not be.
      - name: Compute image prefix
        id: prefix
        run: echo "prefix=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/pssid-gui2" >> "$GITHUB_OUTPUT"

      - name: Build and push client (default edition)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/client/Dockerfile
          target: runtime
          build-args: |
            VITE_EDITION=default
          push: true
          tags: |
            ${{ steps.prefix.outputs.prefix }}_client:latest
            ${{ steps.prefix.outputs.prefix }}_client:sha-${{ github.sha }}

      - name: Build and push client (umich edition)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/client/Dockerfile
          target: runtime
          build-args: |
            VITE_EDITION=umich
          push: true
          tags: |
            ${{ steps.prefix.outputs.prefix }}_client:umich
            ${{ steps.prefix.outputs.prefix }}_client:umich-sha-${{ github.sha }}

      - name: Build and push server
        uses: docker/build-push-action@v6
        with:
          context: services/server
          push: true
          tags: |
            ${{ steps.prefix.outputs.prefix }}_server:latest
            ${{ steps.prefix.outputs.prefix }}_server:sha-${{ github.sha }}

      - name: Build and push mongo
        uses: docker/build-push-action@v6
        with:
          context: services/database
          push: true
          tags: |
            ${{ steps.prefix.outputs.prefix }}_mongo:latest
            ${{ steps.prefix.outputs.prefix }}_mongo:sha-${{ github.sha }}
