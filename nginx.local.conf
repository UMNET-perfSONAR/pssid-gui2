# nginx for the LOCAL dev stack (docker-compose.local.yml).
#
# Plain HTTP on one port, no TLS and no SSO redirect routes — the dev stack runs
# with ENABLE_SSO false, so /login, /logout and /callback are not proxied here.
# The production config (nginx.conf) is rendered per-host by install.sh; this one
# is committed as-is and never rewritten.

events {}

http {
    server {
        listen 80;
        server_name localhost;

        # The Vue dev server, including the Vite HMR websocket.
        location / {
            proxy_pass http://client:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # The API. The X-Forwarded-* headers matter as much here as in
        # production: the server sets `trust proxy` to 1 and keys its per-IP rate
        # limiter off the result, so without X-Forwarded-For every request is
        # attributed to this container's address and all callers share a single
        # 200/min bucket. Sending them keeps the dev stack's behaviour honest.
        location /api/ {
            proxy_pass http://server:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
